name: Build YuyanIme APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Apply long-press translation patches
        run: |
          cd yuyansdk
          git apply ../patches/longpress_translation.patch
          git apply ../patches/longpress_translation_inputview.patch
          git apply ../patches/longpress_translation_imeservice.patch
          cd ..

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode Keystore (skip if not configured)
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "KEYSTORE_FILE=$(pwd)/keystore.jks" >> $GITHUB_ENV
          else
            echo "No keystore configured, building debug APK only"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build APK
        run: ./gradlew assembleOffline
        env:
          RELEASE_STORE_FILE: ${{ env.KEYSTORE_FILE || '' }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD || '' }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS || '' }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || '' }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v5
        with:
          name: yuyanime-debug
          path: app/build/outputs/apk/offline/debug/*.apk

      - name: Upload Release APK (if signed)
        if: env.KEYSTORE_FILE != ''
        uses: actions/upload-artifact@v5
        with:
          name: yuyanime-release
          path: app/build/outputs/apk/offline/release/*.apk

      - name: Upload to Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/offline/release/*.apk
            app/build/outputs/apk/offline/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
