name: Build YuyanIme APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Apply long-press translation changes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path.cwd()
          sdk = root / "yuyansdk"

          def read(path):
              return path.read_text(encoding="utf-8")

          def write(path, text):
              path.write_text(text, encoding="utf-8")
              print("patched", path.relative_to(root))

          def replace_required(text, old, new, name):
              if old not in text:
                  raise SystemExit(f"missing pattern: {name}")
              return text.replace(old, new, 1)

          base = sdk / "src/main/java/com/yuyan/imemodule/keyboard/BaseKeyboardView.kt"
          text = read(base)
          if "fun onEnterLongPress()" not in text:
              text = replace_required(
                  text,
                  """            val softKey = mCurrentKey!!
            val keyboardSymbol = ThemeManager.prefs.keyboardSymbol.getValue()""",
                  """            val softKey = mCurrentKey!!
            if (softKey.code == KeyEvent.KEYCODE_ENTER) {
                mAbortKey = true
                mLongPressKey = false
                mService?.onEnterLongPress()
                dismissPreview()
                return
            }
            val keyboardSymbol = ThemeManager.prefs.keyboardSymbol.getValue()""",
                  "enter long press hook",
              )
          write(base, text)

          service = sdk / "src/main/java/com/yuyan/imemodule/service/ImeService.kt"
          text = read(service)
          if "ExtractedTextRequest" not in text:
              text = replace_required(
                  text,
                  "import android.view.inputmethod.EditorInfo\n",
                  "import android.view.inputmethod.EditorInfo\nimport android.view.inputmethod.ExtractedTextRequest\n",
                  "extracted text import",
              )
          if "getTranslatableTextBeforeCursor" not in text:
              text = replace_required(
                  text,
                  """    fun getTextBeforeCursor(length:Int) : String {
        return currentInputConnection.getTextBeforeCursor(length, 0).toString()
    }""",
                  """    fun getTextBeforeCursor(length:Int) : String {
        return currentInputConnection.getTextBeforeCursor(length, 0).toString()
    }

    fun getTranslatableTextBeforeCursor(length: Int): String {
        val inputConnection = currentInputConnection ?: return ""
        val extracted = inputConnection.getExtractedText(ExtractedTextRequest(), 0)
        val text = extracted?.text?.toString()
        if (!text.isNullOrBlank()) {
            val safeEnd = extracted.selectionEnd.coerceIn(0, text.length)
            return text.substring(0, safeEnd).takeLast(length)
        }
        return inputConnection.getTextBeforeCursor(length, 0).toString()
    }""",
                  "translatable text helper",
              )
          write(service, text)

          input_view = sdk / "src/main/java/com/yuyan/imemodule/keyboard/InputView.kt"
          text = read(input_view)
          text, count = re.subn(
              r"val enterKeyToggleState: Int\s*get\(\) = when \{.*?\n\s*\}",
              """val enterKeyToggleState: Int
        get() = when {
            isAddPhrases -> 4
            aiTranslationState == AITranslationState.TRANSLATING -> 11
            else -> InputModeSwitcher.mToggleStates.imeAction
        }""",
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit("failed to patch enterKeyToggleState")
          if "fun onEnterLongPress()" not in text:
              text = replace_required(
                  text,
                  "    override fun responseLongKeyEvent(result: Pair<PopupMenuMode, String>) {",
                  """    fun onEnterLongPress() {
        if (aiTranslationState == AITranslationState.TRANSLATING) return
        DevicesUtils.tryVibrate(this)
        triggerTranslation()
    }

    override fun responseLongKeyEvent(result: Pair<PopupMenuMode, String>) {""",
                  "onEnterLongPress method",
              )
          text = text.replace(
              """        val fullText = service.getTextBeforeCursor(5000)
        val lastNewline = fullText.lastIndexOf('\\n')
        val sourceText = if (lastNewline >= 0) fullText.substring(lastNewline + 1) else fullText""",
              "        val sourceText = service.getTranslatableTextBeforeCursor(5000)",
              1,
          )
          text = text.replace("aiTranslationState = AITranslationState.TRANSLATED", "aiTranslationState = AITranslationState.IDLE")
          write(input_view, text)
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode Keystore (skip if not configured)
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "KEYSTORE_FILE=$(pwd)/keystore.jks" >> $GITHUB_ENV
          else
            echo "No keystore configured, building debug APK only"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build APK
        run: ./gradlew assembleOffline
        env:
          RELEASE_STORE_FILE: ${{ env.KEYSTORE_FILE || '' }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD || '' }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS || '' }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || '' }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v5
        with:
          name: yuyanime-debug
          path: app/build/outputs/apk/offline/debug/*.apk

      - name: Upload Release APK (if signed)
        if: env.KEYSTORE_FILE != ''
        uses: actions/upload-artifact@v5
        with:
          name: yuyanime-release
          path: app/build/outputs/apk/offline/release/*.apk

      - name: Upload to Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/offline/release/*.apk
            app/build/outputs/apk/offline/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
